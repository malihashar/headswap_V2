name: klein4b_quality
pipeline: klein

# FLUX.2 [klein] 4B distilled — quality preset WITHOUT dumping steps.
# Distilled Klein is designed for ~4 steps; 20+ steps makes it waxy/overcooked.
# Quality comes from: square crop, solid BFS LoRA, better mask/stitch, RMBG face.
unet_name: flux-2-klein-4b-fp8.safetensors
unet_name_fallback: flux-2-klein-4b.safetensors

clip_name: qwen_3_4b.safetensors
clip_type: flux2
vae_name: flux2-vae.safetensors

bfs_lora_name: bfs_head_v1.1_optional_flux-klein_4b.safetensors
bfs_lora_strength: 1.0

# Keep near official distilled sweet spot (do NOT raise to 20+).
steps: 4
cfg: 1.2
sampler: euler
scheduler: simple
seed: 46
denoise: 1.0

# White-bg sticker is ReferenceLatent-only (never pasted onto the body).
face_white_bg: true
align_paste_refine: false

# Working resolution: quality lever that barely affects step count.
# 896 is a T4-friendly compromise vs 1024.
max_body_dim: 1024
crop_long_side: 896
square_crop: true
mask_expand_px: 22
mask_blur_px: 14
div_by: 16
post_color_match_strength: 0.4
force_full_load: true

prompt: >-
  head_swap: start with Picture 1 as the base image, keeping its lighting,
  environment, and background. remove the head from Picture 1 completely and
  replace it with the head from Picture 2, strictly preserving the hair, eye
  color, nose structure of Picture 2. copy the direction of the eye, head
  rotation, micro expressions from Picture 1, high quality, sharp details, 4k.

negative_prompt: ""

face_side_pad: 0.40
face_top_pad: 0.70
face_bot_pad: 0.30
include_shoulders: true
