name: omnigen2
pipeline: omnigen2

# Experimental — OmniGen2 in-context head/face transfer.
# Official repo:    https://github.com/VectorSpaceLab/OmniGen2
# Official weights: https://huggingface.co/OmniGen2/OmniGen2
#
# Native multi-image API (body = image 1, face = image 2).
# Does NOT modify qwen_baseline / flux_kontext / step1x_edit.

model_id: OmniGen2/OmniGen2
model_path: /tmp/models/OmniGen2
dtype: bf16
# 14–16GB Kaggle GPUs: sequential offload is required (model offload alone OOMs).
enable_model_cpu_offload: false
enable_sequential_cpu_offload: true

# Official example defaults (example_edit.sh / example_in_context_generation.sh).
steps: 28
guidance: 5.0                 # text_guidance_scale
image_guidance: 2.0           # slightly lower peak vs 2.5; still in edit/in-context band
seed: 0
scheduler: euler              # euler | dpmsolver++
# Official API has no denoise/strength; kept for config parity.
strength: 1.0
# Longest side for body / output. 512 fits ~15GB with sequential offload.
crop_size: 512
max_input_image_pixels: 262144    # 512*512
max_input_image_side_length: 512
cfg_range_start: 0.0
cfg_range_end: 1.0

# Official in-context prompt template (README tip #5).
prompt: >-
  Edit the first image: replace the head with the head from the second image.
  Preserve the body, pose, clothing, background, camera angle and lighting of
  the first image. Match the identity from the second image as accurately as
  possible. Do not change anything except the head and neck transition.

# Official inference.py default negative prompt.
negative_prompt: >-
  (((deformed))), blurry, over saturation, bad anatomy, disfigured,
  poorly drawn face, mutation, mutated, (extra_limb), (ugly),
  (poorly drawn hands), fused fingers, messy drawing, broken legs censor,
  censored, censor_bar

face_side_pad: 0.35
face_top_pad: 0.65
face_bot_pad: 0.15
