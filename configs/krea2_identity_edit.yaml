name: krea2_identity_edit
pipeline: krea2

# Krea 2 Turbo FP8 + community Identity Edit LoRA (two-image head/face swap).
# Scene = body (Picture 1), person = face (Picture 2) — fixed training order.
# Requires: comfyui-krea2edit custom nodes + recent ComfyUI (CLIP type krea2).
#
# === Sampling latency (T4) ===
# Profile showed ~160s in diffusion alone with force_full_load=false — that is
# Comfy NORMAL_VRAM streaming UNet weights CPU↔GPU every step (~20s/step).
# force_full_load=true keeps the UNet fully on GPU during KSampler (CLIP is
# unloaded first). Quality unchanged; residency only.
#
# Author Turbo rec: 8 steps, CFG disabled (0) for pure T2I.
# Identity-Edit LoRA rec: Turbo 8–12 steps, CFG 1.0 — we keep cfg=1.0.
unet_name: krea2_turbo_fp8_scaled.safetensors
clip_name: qwen3vl_4b_fp8_scaled.safetensors
clip_type: krea2
vae_name: qwen_image_vae.safetensors

identity_lora_name: krea2_identity_edit_v1_2_r64.safetensors
identity_lora_strength: 1.0

steps: 8
cfg: 1.0
sampler: euler
scheduler: simple
seed: 46
denoise: 1.0

# Match Turbo distilled timestep shift (mu=1.15) when ModelSamplingFlux exists.
apply_timestep_shift: true
timestep_shift_mu: 1.15
timestep_base_shift: 0.5

# REQUIRED for T4 speed — without this, expect ~10–30s per denoising step.
force_full_load: true

# Software speed knobs (quality-preserving). Expected impact on T4:
#   silence krea2edit flush prints + no progress bar: ~1–5% sample (sync removal)
#   inference_mode + TF32/SDPA prefs: small, free
#   shared runtime / model cache (2nd image same kernel): ~25s bootstrap + ~7s load → ~0
#   debug_count_unet_forwards: leave false (Python wrap per forward)
#   torch_compile: false on cold single-image; true on A100 multi-image after warm compile
skip_negative_grounding: true
debug_count_unet_forwards: false
torch_compile: false
torch_compile_mode: reduce-overhead
save_debug: false
verbose: false

ref_boost: 4.0
ref_boost_a: 1.0
grounding_px: 768
fit_mode: fit
max_dim: 768
div_by: 16

# --- Locality (mask → crop → edit → soft stitch → LAB) ---
# Same shell as Klein promote / Qwen improved. Diffusion still Krea2 dual-ref
# on the crop (Picture 1 = body crop, Picture 2 = face). Set false for full-frame A/B.
mask_crop_stitch: true
max_body_dim: 1024
crop_long_side: 768
square_crop: false
mask_expand_px: 18
mask_blur_px: 12
mask_top_extend: 1.25
mask_side_extend: 0.60
mask_bot_extend: 0.40
stitch_feather_px: 10
post_color_match_strength: 0.35

prompt: >-
  Replace the person's head and face in the first image with the person from
  the second image. Preserve the exact facial identity of the second person —
  bone structure, jawline, eyebrows, eyes, nose, mouth, hairline, and skin.
  Keep the body, clothing, pose, camera angle, lighting, and background from
  the first image. Remove the original face and glasses from the first person.
  Photorealistic, natural skin texture, sharp details.

negative_prompt: ""

face_side_pad: 0.28
face_top_pad: 0.55
face_bot_pad: 0.20
include_shoulders: false
