name: krea2_identity_edit
pipeline: krea2

# Krea 2 Turbo FP8 + community Identity Edit LoRA (two-image head/face swap).
# Scene = body (Picture 1), person = face (Picture 2) — fixed training order.
# Requires: comfyui-krea2edit custom nodes + recent ComfyUI (CLIP type krea2).
#
# Latency notes (Kaggle T4):
#   - Official Turbo sweet spot is 8 steps (was 10).
#   - At cfg=1.0 the negative VLM encode is skipped (unused by CFG) — big win.
#   - First call pays Comfy bootstrap + weight load; reuse the same Python process
#     for a second image to measure warm latency (models stay in rt.models).
#   - T4 may still OOM at 768 — then try max_dim 640.
unet_name: krea2_turbo_fp8_scaled.safetensors
clip_name: qwen3vl_4b_fp8_scaled.safetensors
clip_type: krea2
vae_name: qwen_image_vae.safetensors

# Rank-64 LoRA (~0.4 GiB) for T4; swap to full v1_2 via --include-optional download.
identity_lora_name: krea2_identity_edit_v1_2_r64.safetensors
identity_lora_strength: 1.0

# Turbo distilled: 8 steps is the official / workflow-recommended fast path.
# (10 was "balanced"; 12 = more face detail. Quality priority keeps cfg=1.0.)
steps: 8
cfg: 1.0
sampler: euler
scheduler: simple
seed: 46
denoise: 1.0

# Skip Qwen3-VL grounded negative when cfg<=1 (KSampler ignores it).
skip_negative_grounding: true
save_debug: true

# Two-image identity edit knobs (see comfyui-krea2edit README).
ref_boost: 4.0
ref_boost_a: 1.0
grounding_px: 768
fit_mode: fit
max_dim: 768
div_by: 16
force_full_load: false

prompt: >-
  Replace the person's head and face in the first image with the person from
  the second image. Preserve the exact facial identity of the second person —
  bone structure, jawline, eyebrows, eyes, nose, mouth, hairline, and skin.
  Keep the body, clothing, pose, camera angle, lighting, and background from
  the first image. Remove the original face and glasses from the first person.
  Photorealistic, natural skin texture, sharp details.

negative_prompt: ""

face_side_pad: 0.28
face_top_pad: 0.55
face_bot_pad: 0.20
include_shoulders: false
