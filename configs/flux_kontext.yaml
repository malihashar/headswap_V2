name: flux_kontext
pipeline: flux_kontext

# FLUX.1 Kontext [dev] FP8 — hard Align→Paste then light refine.
# Prior failure mode: soft paste left destination identity (glasses) dominant,
# then Kontext "healed" back to the body person. Fix = opaque donor core +
# stitch from composite + lower denoise so paste identity survives.
unet_name: flux1-dev-kontext_fp8_scaled.safetensors
clip_name1: clip_l.safetensors
clip_name2: t5xxl_fp8_e4m3fn_scaled.safetensors
clip_type: flux
vae_name: ae.safetensors

placement_lora: null
placement_lora_strength: 1.0

# Keep paste identity; only blend seams / lighting.
steps: 28
cfg: 1.0
flux_guidance: 3.5
sampler: euler
scheduler: simple
seed: 46
denoise: 0.55
empty_latent: false
max_dim: 768
div_by: 8

reference_latent: true
identity_reference: true
conditioning_zero_out: true
image_scale: true
flux_kontext_image_scale: true

# Opaque donor core so glasses/destination face cannot show through.
paste_core_min_alpha: 0.94
paste_ellipse_scale_x: 2.05
paste_ellipse_scale_y: 2.55
paste_feather_px: 21
# Stitch refined head onto pasted composite (not original body).
stitch_from_composite: true

mask_expand_px: 28
mask_blur_px: 10

pre_color_match_strength: 0.45
post_color_match_strength: 0.25

prompt: >-
  Put it here. Natural face blend, match lighting and skin tone,
  preserve same pose, clothing, background, and body. No style change.

negative_prompt: ""

# Generous pads — OpenCV often returns a tight/upper face box on studio cutouts.
face_side_pad: 0.45
face_top_pad: 0.55
face_bot_pad: 0.75
