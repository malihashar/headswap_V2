name: klein4b_mask_crop_stitch
pipeline: klein

# FLUX.2 [klein] 4B distilled — Apache 2.0
# Primary checkpoint: official BFL FP8 (Comfy template widget name).
# Source: https://huggingface.co/black-forest-labs/FLUX.2-klein-4b-fp8
# Docs:   https://docs.comfy.org/tutorials/flux/flux-2-klein
unet_name: flux-2-klein-4b-fp8.safetensors
# Fallback if only the bf16 Comfy-Org package was downloaded
unet_name_fallback: flux-2-klein-4b.safetensors

# Text encoder: Comfy-Org Klein 4B packaging (docs link)
# https://huggingface.co/Comfy-Org/flux2-klein-4B
clip_name: qwen_3_4b.safetensors
clip_type: flux2

# VAE: Comfy docs link this from Comfy-Org/flux2-dev
# https://huggingface.co/Comfy-Org/flux2-dev
vae_name: flux2-vae.safetensors

# OPTIONAL community head-swap LoRA (MIT). Keep strength 0 unless A/B testing.
# https://huggingface.co/Alissonerdx/BFS-Best-Face-Swap
bfs_lora_name: bfs_head_v1.1_optional_flux-klein_4b.safetensors
bfs_lora_strength: 0.0

steps: 4
cfg: 1.0
sampler: euler
scheduler: simple
seed: 46
denoise: 1.0

# Locality
max_body_dim: 1280
crop_long_side: 1024
mask_expand_px: 18
mask_blur_px: 12
div_by: 16

prompt: >-
  head_swap: start with Picture 1 as the base image, keeping its lighting,
  environment, and background. remove the head from Picture 1 completely and
  replace it with the head from Picture 2, strictly preserving the hair, eye
  color, nose structure of Picture 2. copy the direction of the eye, head
  rotation, micro expressions from Picture 1, high quality, sharp details, 4k.

negative_prompt: ""

face_side_pad: 0.35
face_top_pad: 0.65
face_bot_pad: 0.25
include_shoulders: true
