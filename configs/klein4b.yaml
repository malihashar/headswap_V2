name: klein4b_mask_crop_stitch
pipeline: klein

# FLUX.2 [klein] 4B distilled — Apache 2.0
unet_name: flux-2-klein-4b.safetensors
# Prefer fp8 when present (Comfy template name); loader falls back to unet_name
unet_name_fp8: flux-2-klein-4b-fp8.safetensors
clip_name: qwen_3_4b.safetensors
clip_type: flux2
vae_name: flux2-vae.safetensors

# Optional BFS head-swap LoRA (run A/B with and without)
bfs_lora_name: bfs_head_v1.1_optional_flux-klein_4b.safetensors
bfs_lora_strength: 0.0   # 0 = off (recommended first); try 0.8–1.0 in A/B

steps: 4
cfg: 1.0
sampler: euler
scheduler: simple
seed: 46
denoise: 1.0

# Locality
max_body_dim: 1280          # full body kept for stitch; edit happens on crop
crop_long_side: 1024        # working resolution for head crop
mask_expand_px: 18
mask_blur_px: 12
div_by: 16

prompt: >-
  head_swap: start with Picture 1 as the base image, keeping its lighting,
  environment, and background. remove the head from Picture 1 completely and
  replace it with the head from Picture 2, strictly preserving the hair, eye
  color, nose structure of Picture 2. copy the direction of the eye, head
  rotation, micro expressions from Picture 1, high quality, sharp details, 4k.

negative_prompt: ""

# Face reference prep
face_side_pad: 0.35
face_top_pad: 0.65
face_bot_pad: 0.25
include_shoulders: true
